<!DOCTYPE html>
<html>
<head>
	<title>Contact us</title>
    <style>

    ul {
        list-style-type: square;
    }

    body {
	background-color: #f5f5f5;
	padding: 20px;
	margin: 20px;
	border-radius: 10px;
	box-shadow: 0 0 10px rgba(0,0,0,0.1);
	transition: background-color 0.3s ease;
    }

body:hover {
	background-color: #f2f2f2;
}

header {
	background-color: #e2e2e2;
	padding: 20px;
	text-align: center;
	transition: background-color 0.9s ease;
}

header:hover {
	background-color: #4bff5a;
}

h1 {
	font-size: 24px;
	margin-top: 0;
	transition: color 0.3s ease;
	color: #303030;
}

h1:hover {
	color: #000;
}

li {
	padding: 20px;
	transition: color 0.9s ease;
	transition: transform 0.9s ease;
}

li:hover {
	color: #ff0000;
	transform: scale(1.01);
}

@keyframes pulse {
	0% {
		transform: scale(1);
	}
	50% {
		transform: scale(1.01);
	}
	100% {
		transform: scale(1);
	}
}

    </style>
</head>
<body>
	<header>
		<h1>! Contact Information</h1>
	</header>
    <ul>
        <br>
        <li>Email: primary@amazon.com</li>
        <br><br>
        <li>Customer service Email :  cs-reply@amazon.com</li>
        <br><br>
        <li>Customer care Phone no : 02070847911</li>
    </ul>
</body>
</html>
