<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
}

.profile-container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
    background-color: #fff;
    border: 1px solid #ddd;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    border-radius: 5px;
    overflow: hidden;
}

.profile-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    padding: 20px;
    background-color: #4CAF50;
    color: #fff;
    border-radius: 5px;
}

.profile-photo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-right: 20px;
    border: 2px solid #fff;
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease;
}

.profile-photo:hover {
    transform: scale(1.1);
}

.username {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
}

.profile-info {
    margin-bottom: 20px;
    padding: 20px;
    background-color: #f5f5f5;
    border-radius: 5px;
}

ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

li {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

li:last-child {
    border-bottom: none;
}

span {
    font-weight: bold;
    margin-right: 10px;
}

a {
    text-decoration: none;
    color: #337ab7;
}

a:hover {
    color: #23527c;
}

.profile-details {
    margin-bottom: 20px;
    padding: 20px;
    background-color: #f5f5f5;
    border-radius: 5px;
}

.profile-details p {
    margin-bottom: 20px;
}

.profile-details p:last-child {
    margin-bottom: 0;
}

h2 {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #4CAF50;
}

h2::after {
    content: "";
    display: block;
    width: 50px;
    height: 3px;
    background-color: #4CAF50;
    margin-top: 5px;
}
    </style>

</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/168/168732.png" alt="Profile Photo" class="profile-photo">
            <h1 class="username">Apla manus</h1>
        </div>
        <div class="profile-info">
            <h2>Contact Information</h2>
            <ul>
                <li><span>Phone:</span>+91 6969696969</li>
                <li><span>Email:</span> <a href="mailto:aplamanus@x.com">aplamanus@x.com</a></li>
                <li><span>Address:</span>Dubai phata, near jhannum, bhupendra jogi 411069</li>
            </ul>
        </div>
        <div class="profile-details">
            <h2>About Me</h2>
            <p>Nurse smiled at me at police ki cowki 11/11/11.
                <br>
            Maa ki dua baap ka road, jo bich mai ajaye uda dunga m*
            </p>
        </div>
    </div>
</body>
</html>
